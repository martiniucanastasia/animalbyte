name: Daily Animal Fact

on:
  schedule:
    - cron: '0 15 * * *'  # every day at 4:00 PM UK time (BST = UTC+1)
  workflow_dispatch:      # allows manual trigger from GitHub UI

permissions:
  contents: write         # needed to commit posted.json back

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post animal fact
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python animal_facts_bot.py

      - name: Save posted history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json
          git diff --staged --quiet || git commit -m "chore: update posted animals history [skip ci]"
          git push
